<script data-cfasync="false">
  // Animações só quando o navegador realmente pinta frames (evita estados "presos"
  // em renders estáticos/prints): sem js-anim, tudo mostra o estado final.
  requestAnimationFrame(function () { document.documentElement.classList.add('js-anim'); });
</script>
<style>
  html { scroll-behavior: smooth; }
  body.dt { min-height: 100vh; }

  /* ---- Reveal (entrada por scroll — só com js-anim) ---- */
  .js-anim .dash-reveal { opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity 0.8s var(--ease-entrance), transform 0.8s var(--ease-entrance), filter 0.8s var(--ease-entrance); }
  .js-anim .dash-reveal.is-on { opacity: 1; transform: translateY(0); filter: blur(0); }
  @media (prefers-reduced-motion: reduce) {
    .js-anim .dash-reveal { opacity: 1; transform: none; filter: none; transition: none; }
  }
  /* Gráficos: transições gateadas em js-anim (delay vem inline) */
  .js-anim .dash-anim { transition-property: width, height, stroke-dasharray;
    transition-duration: 1.1s; transition-timing-function: var(--ease-out); }

  /* ---- Nav fixa ---- */
  .dash-nav { position: sticky; top: 0; z-index: 50; background: rgba(9, 9, 11, 0.72);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-faint); }
  .dash-nav__inner { max-width: var(--container-wide); margin: 0 auto; padding: 0 40px; height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .dash-nav__sep { width: 1px; height: 18px; background: var(--border-soft); }

  /* ---- Tooltip de métrica ---- */
  .dash-tip { position: relative; display: inline-flex; align-items: center; color: var(--fg-ghost);
    font-size: 13px; cursor: help; outline: none; }
  .dash-tip:hover, .dash-tip:focus-visible { color: var(--fg-3); }
  .dash-tip__bubble { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%) translateY(4px);
    width: 240px; padding: 10px 14px; border-radius: var(--radius-inner);
    background: var(--bg-panel); border: 1px solid var(--border-soft);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    font-family: var(--font-body); font-size: 0.76rem; font-weight: 300; line-height: 1.55; color: var(--fg-3);
    text-transform: none; letter-spacing: 0; white-space: normal; text-align: left;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s var(--ease-out); z-index: 60; }
  .dash-tip:hover .dash-tip__bubble, .dash-tip:focus-visible .dash-tip__bubble {
    opacity: 1; transform: translateX(-50%) translateY(0); }
  .dash-tip--roi { color: rgba(110, 231, 183, 0.5); }
  .dash-tip--funnel { color: rgba(125, 211, 252, 0.5); }

  /* ---- Tabela de ferramentas ---- */
  .dash-trow { display: grid; grid-template-columns: 1fr 76px 110px; gap: 12px; align-items: baseline;
    padding: 9px 0; border-bottom: 1px solid var(--border-faint); font-size: var(--text-body-sm); }
  .dash-trow:last-child { border-bottom: none; }
  .dash-trow--head { font-size: var(--text-micro); text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg-muted); font-weight: 500; }
  .dash-trow--sub { color: var(--fg-muted); font-size: var(--text-caption); }
  .dash-trow--total { border-top: 1px solid var(--border-soft); border-bottom: none; padding-top: 12px;
    color: var(--fg-2); font-weight: 500; }
  .dash-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--text-caption); }

  /* ---- Selo pendente ---- */
  .dash-pending { display: inline-flex; align-items: center; gap: 9px; padding: 6px 16px;
    border-radius: var(--radius-pill); border: 1px dashed rgba(56, 189, 248, 0.35);
    background: var(--accent-funnel-soft); color: var(--sky-300);
    font-family: var(--font-mono); font-size: var(--text-micro); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ---- Faixa de saldo final ---- */
  .dash-final { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
    padding: 24px 32px; border-radius: var(--radius-card);
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.07), rgba(255, 255, 255, 0.02) 60%);
    border: 1px solid var(--border-roi); box-shadow: var(--glow-roi); }

  /* ---- Painel: faixa de KPIs + grid bento ---- */
  .dash-kpistrip { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .dash-bentogrid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; margin-top: 16px; }

  /* ---- Executivo ---- */
  .dash-xrow { display: flex; align-items: baseline; justify-content: space-between; gap: 20px;
    padding: 14px 0; border-bottom: 1px solid var(--border-faint); }
  .dash-details { margin-top: 14px; }
  .dash-details summary { cursor: pointer; font-size: var(--text-caption); color: var(--fg-muted);
    list-style: none; display: inline-flex; align-items: center; gap: 6px; }
  .dash-details summary::before { content: '+'; font-family: var(--font-mono); color: var(--fg-ghost); }
  .dash-details[open] summary::before { content: '−'; }
  .dash-details summary:hover { color: var(--fg-3); }

  /* ---- Responsivo ---- */
  @media (max-width: 900px) {
    .dash-grid-2, .dash-grid-3 { grid-template-columns: 1fr !important; }
    .dash-bentogrid > * { grid-column: span 12 !important; }
    .dash-nav__inner, .dt-container { padding-left: 22px; padding-right: 22px; }
  }
</style>
